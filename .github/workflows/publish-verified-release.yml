name: Publish Verified Release

on:
  repository_dispatch:
    types: [publish_verified_release]

permissions:
  actions: read
  contents: write
  attestations: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: automation
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0
          ref: ${{ github.event.client_payload.tag }}

      - name: Verify release before publishing
        env:
          GH_TOKEN: ${{ secrets.IAM_UPDATE_PAT }}
          TAG: ${{ github.event.client_payload.tag }}
          VERIFIED_REF: ${{ github.event.client_payload.verified_ref }}
          VERIFIED_RUN_ID: ${{ github.event.client_payload.verified_run_id }}
          VERIFIED_SHA: ${{ github.event.client_payload.verified_sha }}
        run: |
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Expected semver release tag in repository_dispatch payload, got: $TAG"
            exit 1
          fi

          expected_ref="refs/tags/${TAG}"
          if [[ "$VERIFIED_REF" != "$expected_ref" ]]; then
            echo "Expected verified_ref $expected_ref, got: $VERIFIED_REF"
            exit 1
          fi

          if [[ -z "$VERIFIED_RUN_ID" ]]; then
            echo "Missing verified_run_id in repository_dispatch payload."
            exit 1
          fi

          if [[ ! "$VERIFIED_SHA" =~ ^[0-9a-f]{40}$ ]]; then
            echo "Missing or invalid verified_sha in repository_dispatch payload."
            exit 1
          fi

          echo "Publishing $TAG after verification run ${VERIFIED_RUN_ID}."

          run_json="$(gh api "/repos/${GITHUB_REPOSITORY}/actions/runs/${VERIFIED_RUN_ID}")"

          run_name="$(jq -r '.name // empty' <<<"$run_json")"
          run_event="$(jq -r '.event // empty' <<<"$run_json")"
          run_status="$(jq -r '.status // empty' <<<"$run_json")"
          run_conclusion="$(jq -r '.conclusion // empty' <<<"$run_json")"
          run_head_branch="$(jq -r '.head_branch // empty' <<<"$run_json")"
          run_head_sha="$(jq -r '.head_sha // empty' <<<"$run_json")"

          if [[ "$run_name" != "Verify Draft Release" ]]; then
            echo "Workflow run ${VERIFIED_RUN_ID} is ${run_name:-unnamed}, not Verify Draft Release."
            exit 1
          fi

          if [[ "$run_event" != "workflow_dispatch" ]]; then
            echo "Workflow run ${VERIFIED_RUN_ID} was triggered by ${run_event:-unknown}, not workflow_dispatch."
            exit 1
          fi

          if [[ "$run_status" != "completed" || "$run_conclusion" != "success" ]]; then
            echo "Workflow run ${VERIFIED_RUN_ID} is ${run_status:-unknown}/${run_conclusion:-unknown}, not completed/success."
            exit 1
          fi

          if [[ "$run_head_branch" != "$TAG" ]]; then
            echo "Workflow run ${VERIFIED_RUN_ID} was recorded on ${run_head_branch:-unknown}, not ${TAG}."
            exit 1
          fi

          if [[ "$run_head_sha" != "$VERIFIED_SHA" ]]; then
            echo "Workflow run ${VERIFIED_RUN_ID} head SHA ${run_head_sha:-unknown} does not match verified SHA ${VERIFIED_SHA}."
            exit 1
          fi

          git fetch --no-tags origin main:refs/remotes/origin/main

          if [[ "$(git cat-file -t "$TAG")" != "tag" ]]; then
            echo "Expected $TAG to be an annotated tag."
            exit 1
          fi

          gpg --import keys/release-signing-key.asc
          git verify-tag "$TAG"

          tag_commit="$(git rev-parse "$TAG^{commit}")"
          head_commit="$(git rev-parse HEAD)"
          if [[ "$tag_commit" != "$head_commit" ]]; then
            echo "Expected checked out commit $head_commit to match $TAG commit $tag_commit."
            exit 1
          fi

          if [[ "$tag_commit" != "$VERIFIED_SHA" ]]; then
            echo "Expected checked out tag commit $tag_commit to match verified SHA $VERIFIED_SHA."
            exit 1
          fi

          if ! git merge-base --is-ancestor "$tag_commit" origin/main; then
            echo "Expected $TAG commit $tag_commit to be reachable from origin/main."
            exit 1
          fi

          expected_version="${TAG#v}"
          package_version="$(node -p "require('./package.json').version")"
          lockfile_version="$(node -p "require('./package-lock.json').version")"

          if [[ "$package_version" != "$expected_version" ]]; then
            echo "Expected package.json version $expected_version, got $package_version."
            exit 1
          fi

          if [[ "$lockfile_version" != "$expected_version" ]]; then
            echo "Expected package-lock.json version $expected_version, got $lockfile_version."
            exit 1
          fi

          is_draft="$(gh release view "$TAG" --json isDraft --jq '.isDraft')"
          if [[ "$is_draft" != "true" ]]; then
            echo "Expected tag $TAG to still have a draft release before publishing."
            exit 1
          fi

          for _ in {1..6}; do
            if gh attestation verify dist/index.js \
              --repo "${GITHUB_REPOSITORY}" \
              --signer-workflow "${GITHUB_REPOSITORY}/.github/workflows/verify-draft-release.yml" \
              --source-ref "$expected_ref"; then
              exit 0
            fi

            echo "Attestation was not available yet; retrying in 10 seconds."
            sleep 10
          done

          echo "Failed to verify artifact attestation for dist/index.js."
          exit 1

      - name: Publish the verified draft release
        env:
          GH_TOKEN: ${{ secrets.IAM_UPDATE_PAT }}
          TAG: ${{ github.event.client_payload.tag }}
        run: gh release edit "$TAG" --draft=false

      - name: Verify published release is immutable
        env:
          GH_TOKEN: ${{ secrets.IAM_UPDATE_PAT }}
          TAG: ${{ github.event.client_payload.tag }}
        run: |
          for attempt in 1 2 3 4 5; do
            is_draft="$(gh release view "$TAG" --json isDraft --jq '.isDraft')"
            is_immutable="$(gh release view "$TAG" --json isImmutable --jq '.isImmutable')"

            if [[ "$is_draft" == "false" && "$is_immutable" == "true" ]]; then
              exit 0
            fi

            if [[ "$attempt" -lt 5 ]]; then
              sleep 2
            fi
          done

          echo "Published release $TAG is not immutable."
          echo "Expected isDraft=false and isImmutable=true after publishing."
          echo "Enable GitHub release immutability for this repository before publishing releases."
          exit 1
