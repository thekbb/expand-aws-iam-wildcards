name: Publish Verified Release

on:
  repository_dispatch:
    types: [publish_verified_release]

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: automation
      deployment: false
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Ensure a verified draft release exists for the requested tag
        env:
          GH_TOKEN: ${{ secrets.IAM_UPDATE_PAT }}
          TAG: ${{ github.event.client_payload.tag }}
        run: |
          if [[ -z "$TAG" ]]; then
            echo "Missing release tag in repository_dispatch payload."
            exit 1
          fi

          is_draft="$(gh release view "$TAG" --json isDraft --jq '.isDraft')"
          if [[ "$is_draft" != "true" ]]; then
            echo "Expected tag $TAG to still have a draft release before publishing."
            exit 1
          fi

      - name: Publish the verified draft release
        env:
          GH_TOKEN: ${{ secrets.IAM_UPDATE_PAT }}
          TAG: ${{ github.event.client_payload.tag }}
        run: gh release edit "$TAG" --draft=false
