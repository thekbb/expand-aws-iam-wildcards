name: Verify Draft Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to verify and publish
        required: true
        type: string

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  verify:
    runs-on: ubuntu-latest
    environment:
      name: automation
      deployment: false
    steps:
      - name: Validate release tag input and workflow ref
        env:
          TAG: ${{ inputs.tag }}
          WORKFLOW_REF: ${{ github.ref }}
        run: |
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Expected tag input like v1.2.3."
            exit 1
          fi

          expected_ref="refs/tags/${TAG}"
          if [[ "$WORKFLOW_REF" != "$expected_ref" ]]; then
            echo "Run this workflow from the $TAG tag, not $WORKFLOW_REF."
            echo "In the GitHub UI, choose $TAG in the Run workflow branch/tag dropdown."
            exit 1
          fi

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0
          ref: ${{ inputs.tag }}

      - name: Verify signed release tag
        env:
          TAG: ${{ inputs.tag }}
        run: |
          git fetch --no-tags origin main:refs/remotes/origin/main

          if [[ "$(git cat-file -t "$TAG")" != "tag" ]]; then
            echo "Expected $TAG to be an annotated tag."
            exit 1
          fi

          gpg --import keys/release-signing-key.asc
          git verify-tag "$TAG"

          tag_commit="$(git rev-parse "$TAG^{commit}")"
          head_commit="$(git rev-parse HEAD)"
          if [[ "$tag_commit" != "$head_commit" ]]; then
            echo "Expected checked out commit $head_commit to match $TAG commit $tag_commit."
            exit 1
          fi

          if ! git merge-base --is-ancestor "$tag_commit" origin/main; then
            echo "Expected $TAG commit $tag_commit to be reachable from origin/main."
            exit 1
          fi

      - name: Ensure a draft release exists for the requested tag
        env:
          GH_TOKEN: ${{ secrets.IAM_UPDATE_PAT }}
          TAG: ${{ inputs.tag }}
        run: |
          is_draft="$(gh release view "$TAG" --json isDraft --jq '.isDraft')"
          if [[ "$is_draft" != "true" ]]; then
            echo "Expected a draft release for tag $TAG before verification."
            exit 1
          fi

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '24.14.0'
          cache: 'npm'

      - name: Verify package metadata matches release tag
        env:
          TAG: ${{ inputs.tag }}
        run: |
          expected_version="${TAG#v}"
          package_version="$(node -p "require('./package.json').version")"
          lockfile_version="$(node -p "require('./package-lock.json').version")"

          if [[ "$package_version" != "$expected_version" ]]; then
            echo "Expected package.json version $expected_version, got $package_version."
            exit 1
          fi

          if [[ "$lockfile_version" != "$expected_version" ]]; then
            echo "Expected package-lock.json version $expected_version, got $lockfile_version."
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Lint Markdown
        run: npm run lint:md

      - name: Type check
        run: npm run typecheck

      - name: Run unit tests
        run: npm test -- --coverage

      - name: Build action bundle
        run: npm run build

      - name: Verify committed bundle matches the build output
        run: git diff --exit-code -- dist/index.js

      - name: Generate build provenance attestation
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: dist/index.js

      - name: Verify generated build provenance attestation
        env:
          GH_TOKEN: ${{ secrets.IAM_UPDATE_PAT }}
          TAG: ${{ inputs.tag }}
        run: |
          for _ in {1..6}; do
            if gh attestation verify dist/index.js \
              --repo "${GITHUB_REPOSITORY}" \
              --signer-workflow "${GITHUB_REPOSITORY}/.github/workflows/verify-draft-release.yml" \
              --source-ref "refs/tags/${TAG}"; then
              exit 0
            fi

            echo "Attestation was not available yet; retrying in 10 seconds."
            sleep 10
          done

          echo "Failed to verify generated artifact attestation for dist/index.js."
          exit 1

      - name: Dispatch the publish workflow
        env:
          GH_TOKEN: ${{ secrets.IAM_UPDATE_PAT }}
          TAG: ${{ inputs.tag }}
        run: |
          gh api "repos/${{ github.repository }}/dispatches" \
            --method POST \
            -f event_type='publish_verified_release' \
            --field "client_payload[tag]=$TAG" \
            --field "client_payload[verified_ref]=${GITHUB_REF}" \
            --field "client_payload[verified_run_id]=${GITHUB_RUN_ID}"
