name: Verify Draft Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to verify and publish
        required: true
        type: string

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  verify:
    runs-on: ubuntu-latest
    environment:
      name: automation
      deployment: false
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          ref: ${{ inputs.tag }}

      - name: Ensure a draft release exists for the requested tag
        env:
          GH_TOKEN: ${{ secrets.IAM_UPDATE_PAT }}
          TAG: ${{ inputs.tag }}
        run: |
          is_draft="$(gh release view "$TAG" --json isDraft --jq '.isDraft')"
          if [[ "$is_draft" != "true" ]]; then
            echo "Expected a draft release for tag $TAG before verification."
            exit 1
          fi

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '24.14.0'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Lint Markdown
        run: npm run lint:md

      - name: Type check
        run: npm run typecheck

      - name: Run unit tests
        run: npm test -- --coverage

      - name: Build action bundle
        run: npm run build

      - name: Verify committed bundle matches the build output
        run: git diff --exit-code -- dist/index.js

      - name: Generate build provenance attestation
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: dist/index.js

      - name: Dispatch the publish workflow
        env:
          GH_TOKEN: ${{ secrets.IAM_UPDATE_PAT }}
          TAG: ${{ inputs.tag }}
        run: |
          gh api "repos/${{ github.repository }}/dispatches" \
            --method POST \
            -f event_type='publish_verified_release' \
            -F client_payload[tag]="$TAG"
