name: Prepare Release
run-name: Prepare v${{ inputs.version }}

on:
  workflow_dispatch:
    inputs:
      version:
        description: Semver release version without a leading v
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: prepare-release-v${{ inputs.version }}
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    environment:
      name: automation
    steps:
      - name: Validate requested release version
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Expected version input like 1.2.3"
            exit 1
          fi

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          fetch-depth: 0
          ref: main

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24.14.0'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Lint Markdown
        run: npm run lint:md

      - name: Type check
        run: npm run typecheck

      - name: Run unit tests
        run: npm test -- --coverage

      - name: Update package version
        env:
          VERSION: ${{ inputs.version }}
        run: npm version --no-git-tag-version "$VERSION"

      - name: Build action bundle on Linux
        run: npm run build

      - name: Create or update the release preparation branch
        env:
          GH_TOKEN: ${{ secrets.IAM_UPDATE_PAT }}
          VERSION: ${{ inputs.version }}
        run: |
          BRANCH="release-candidate/v${VERSION}"
          git switch -c "$BRANCH"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json dist/index.js

          if git diff --cached --quiet; then
            echo "No release preparation changes were generated."
            exit 1
          fi

          git commit -m "Prepare v${VERSION} release"
          git push --force-with-lease "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "HEAD:${BRANCH}"

          pr_number="$(gh pr list --head "$BRANCH" --base main --json number --jq '.[0].number // empty')"
          if [[ -n "$pr_number" ]]; then
            echo "Updated existing release preparation PR #$pr_number"
            exit 0
          fi

          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "Prepare v${VERSION} release" \
            --body "Generates the release bundle on Ubuntu, updates package metadata for v${VERSION}, and prepares the exact commit that should be signed and tagged for release."
