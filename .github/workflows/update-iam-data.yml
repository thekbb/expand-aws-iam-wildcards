name: Update IAM Data

on:
  schedule:
    # Run weekly on Mondays at 9am UTC
    - cron: '0 9 * * 1'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: read

jobs:
  update:
    runs-on: ubuntu-latest
    environment:
      name: automation
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0 # Need full history for tags
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24.14.0'

      - name: Install dependencies
        run: npm ci

      - name: Update IAM data package
        run: npm run update-iam-data

      - name: Rebuild action
        run: npm run build

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet -- src/iam-actions.ts src/service-doc-slugs.ts dist/index.js package-lock.json; then
            echo "No generated changes detected - IAM data is up to date"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "Generated changes detected - will open an update PR"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: No changes detected
        if: steps.changes.outputs.changed == 'false'
        run: echo "IAM action data is already up to date. Nothing to commit."

      - name: Create pull request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          # Use a PAT so the PR creation triggers downstream pull_request workflows.
          token: ${{ secrets.IAM_UPDATE_PAT }}
          branch: update-iam-actions-${{ github.run_id }}
          delete-branch: true
          title: "Update IAM action data"
          commit-message: "Update IAM action data"
          body: |
            Updates IAM action data and generated service documentation metadata from @cloud-copilot/iam-data.
          assignees: thekbb
          add-paths: |
            src/iam-actions.ts
            src/service-doc-slugs.ts
            dist/index.js
            package-lock.json
